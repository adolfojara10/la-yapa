  <rect x="72" y="200" width="14" height="22" rx="6" fill="#FAF6F0" stroke="#E5E1D8" stroke-width="2"/>
  <rect x="114" y="200" width="14" height="22" rx="6" fill="#FAF6F0" stroke="#E5E1D8" stroke-width="2"/>
