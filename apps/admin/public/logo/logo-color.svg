<?xml version="1.0" encoding="UTF-8"?>
<!--
  La Yapa logo — full color (placeholder).
  Mark: stylized leaf integrating an Andean mountain silhouette.
  Wordmark: "La Yapa" in Poppins Bold.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100" aria-label="La Yapa">
  <title>La Yapa</title>
  <!-- Mark: leaf + mountain -->
  <g transform="translate(8 12)">
    <!-- Leaf body -->
    <path d="M 38 8 C 18 8 4 30 4 52 C 4 64 14 72 28 72 C 50 72 72 50 72 28 C 72 16 60 8 38 8 Z"
          fill="#2D6A4F"/>
    <!-- Mountain silhouette inside the leaf -->
    <path d="M 14 60 L 30 36 L 40 50 L 52 28 L 68 60 Z" fill="#FAF6F0"/>
    <!-- Mid vein -->
    <path d="M 18 64 Q 36 36 64 16" stroke="#FAF6F0" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="62"
        font-family="Poppins, system-ui, sans-serif"
        font-size="44"
        font-weight="700"
        fill="#1B2D2A"
        letter-spacing="-0.5">La Yapa</text>
  <!-- Tagline -->
  <text x="100" y="84"
        font-family="Inter, system-ui, sans-serif"
        font-size="12"
        font-weight="500"
        fill="#6B7B78"
        letter-spacing="2">COMIDA RESCATADA, PLANETA CUIDADO</text>
</svg>
