services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: layapa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: layapa
      POSTGRES_USER: layapa
      POSTGRES_PASSWORD: layapa
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U layapa -d layapa']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: layapa-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: layapa-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI → http://localhost:8025

  # Optional: run the API in Docker too. Uncomment if you prefer not to use a local venv.
  # api:
  #   build:
  #     context: ./apps/api
  #     target: dev
  #   container_name: layapa-api
  #   command: python manage.py runserver 0.0.0.0:8000
  #   volumes:
  #     - ./apps/api:/app
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - ./apps/api/.env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
