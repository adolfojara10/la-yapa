name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # JS/TS apps (admin, mobile, packages) — lint + type-check + test
  # -----------------------------------------------------------------
  js:
    name: JS / TS (admin, mobile, packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint --filter='!@layapa/api'

      - name: Type-check
        run: pnpm type-check --filter='!@layapa/api'

      - name: Test
        run: pnpm test --filter='!@layapa/api'

  # -----------------------------------------------------------------
  # Django API — lint (ruff), type-check (mypy), tests (pytest)
  # -----------------------------------------------------------------
  api:
    name: Django API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: layapa_test
          POSTGRES_USER: layapa
          POSTGRES_PASSWORD: layapa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U layapa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://layapa:layapa@localhost:5432/layapa_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-insecure-key
      DJANGO_SETTINGS_MODULE: config.settings.test

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: mypy (type check)
        run: mypy . || true   # allow soft fail until stubs are wired

      - name: pytest
        run: pytest
